server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/stock_db?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      indent-output: true

logging:
  level:
    org.springframework: INFO
    org.hibernate.SQL: DEBUG